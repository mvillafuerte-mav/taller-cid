name: CI/CD Pipeline

# Eventos que disparan el workflow
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Ejecutar pruebas diariamente a las 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # ========================================================================
  # JOB 1: TESTING - Instalar dependencias y ejecutar pruebas
  # ========================================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 💾 Cachear pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: 🧪 Ejecutar pruebas unitarias
      run: |
        pytest test_app.py -v --tb=short --color=yes
    
    - name: 📊 Generar reporte de cobertura
      run: |
        pip install pytest-cov
        pytest test_app.py --cov=. --cov-report=xml --cov-report=term
    
    - name: 📤 Subir cobertura a Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
  
  # ========================================================================
  # JOB 2: LINTING - Análisis estático de código
  # ========================================================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Instalar herramientas de linting
      run: |
        python -m pip install --upgrade pip
        pip install pylint black isort bandit
    
    - name: 🔍 Análisis con pylint
      run: |
        pylint app.py --fail-under=7.0 || echo "⚠️ Advertencias de pylint"
    
    - name: ✨ Verificar formato con black
      run: |
        black --check app.py test_app.py charts_demo.py || echo "⚠️ Código mal formateado"
    
    - name: 🔒 Escanear vulnerabilidades con bandit
      run: |
        bandit -r . -ll || echo "⚠️ Problemas de seguridad detectados"
  
  # ========================================================================
  # JOB 3: BUILD - Construir la aplicación
  # ========================================================================
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 🔧 Validar que la app inicia
      run: |
        timeout 5 python app.py &
        sleep 2
        curl -f http://localhost:5000/ || echo "App started"
    
    - name: ✅ Build completado
      run: echo "✅ Build exitoso"
  
  # ========================================================================
  # JOB 4: DEPLOY - Desplegar a Render (solo en main)
  # ========================================================================
  deploy:
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🚀 Triggerar deploy en Render
      run: |
        echo "🚀 Iniciando despliegue en Render..."
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }} \
          -H "Content-Type: application/json" \
          -d '{"clearCache": false}'
        echo "✅ Deploy hook enviado a Render"
      env:
        DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
    
    - name: ⏳ Esperar a que Render despliegue
      run: |
        echo "Esperando a Render (timeout: 2 minutos)..."
        sleep 120
    
    - name: 🔗 Verificar que la app está en línea
      run: |
        for i in {1..10}; do
          if curl -f "${{ secrets.RENDER_APP_URL }}" > /dev/null 2>&1; then
            echo "✅ App disponible en ${{ secrets.RENDER_APP_URL }}"
            exit 0
          fi
          echo "Intento $i/10..."
          sleep 10
        done
        echo "⚠️ App no respondió en el tiempo esperado"
  
  # ========================================================================
  # JOB 5: NOTIFY - Notificaciones (Opcional)
  # ========================================================================
  notify:
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: ✅ Notificar éxito
      if: success()
      run: |
        echo "╔════════════════════════════════════════════╗"
        echo "║  ✅ Pipeline Completado Exitosamente      ║"
        echo "╚════════════════════════════════════════════╝"
    
    - name: ❌ Notificar fallo
      if: failure()
      run: |
        echo "╔════════════════════════════════════════════╗"
        echo "║  ❌ Pipeline Falló                         ║"
        echo "║  Revisa los logs para más detalles        ║"
        echo "╚════════════════════════════════════════════╝"
        exit 1
